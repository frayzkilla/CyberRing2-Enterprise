services:
  postgres:
    image: postgres:15-alpine
    container_name: cybernet-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cybernet}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cybernet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybernet-network

  web:
    image: ${REGISTRY_IMAGE:-enterprise3826-web}:${IMAGE_TAG:-latest}
    build: .
    container_name: cybernet-web
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cybernet}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SECRET_KEY: ${SECRET_KEY:-cyber-secret-2077}
      CHECKER_TOKEN: ${CHECKER_TOKEN:-flag-checker-2077}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-16777216}
      SERVER_PORT: "5050"
    ports:
      - "5050:5050"
    volumes:
      - uploads_data:/app/app/static/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cybernet-network

volumes:
  postgres_data:
  uploads_data:

networks:
  cybernet-network:
    driver: bridge
