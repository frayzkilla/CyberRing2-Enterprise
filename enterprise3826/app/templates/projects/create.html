{% extends 'base.html' %}
{% block title %}Создание проекта — Предприятие 3826{% endblock %}
{% block breadcrumb %}Создание проекта{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-content">
    <div class="page-title">Новый проект</div>
    <div class="page-subtitle">Создание карточки проекта и режима видимости</div>
  </div>
</div>

<div class="card" style="max-width:860px">
  <div class="card-body">
    <form method="POST" class="access-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Название</label>
        <input class="form-input" name="title" required>
      </div>
      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" rows="4" name="summary"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;gap:8px;align-items:center">
          <input type="checkbox" name="is_hidden" checked>
          <span>Скрытый проект (доступ: владелец и EXEC)</span>
        </label>
      </div>
      <button class="btn btn-primary" type="submit">Создать</button>
      <a class="btn btn-ghost" href="/projects">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
